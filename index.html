<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      body, html{
        margin:0;
        width:100%;
        height:100%;
        background-color:#333;
        overflow: hidden;
      }
      #container{
        width: 100%;
        height:100%;
        overflow: hidden;
      }
      div{
        font-size:0px;
      }
    </style>

  </head>
  <body>
    <div id="container"></div>

    <script src="./bodymovin.js"></script>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var animData = {
          container: document.getElementById('container'),
          renderer: 'svg',
          loop: true,
          autoplay: true,
          path: 'data.json'
        };
        var anim = bodymovin.loadAnimation(animData);
      });
    </script>

  </body>
</html>
